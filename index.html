<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-CHAVOSHI | موحسین چاڤۆشی</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/nizar-nastaliq-kurdish" rel="stylesheet">

    <style>
        :root {
            --primary: #1db954;
            --bg-deep: #050505;
            --sidebar-bg: #000000;
            --card-hover: rgba(255, 255, 255, 0.1);
            --text-white: #ffffff;
            --text-gray: #b3b3b3;
            --sidebar-width: 260px;
        }

        .msto-watermark {
            position: fixed; top: 15px; left: 15px;
            font-size: 35px; font-family: 'Nizar Nastaliq Kurdish', serif;
            z-index: 9999; animation: rgb-glow 6s infinite linear;
            pointer-events: none;
        }
        @keyframes rgb-glow {
            0%, 100% { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
            33% { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
            66% { color: #0000ff; text-shadow: 0 0 10px #0000ff; }
        }

        @keyframes rotate-sun { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-white);
            height: 100vh;
            display: grid;
            grid-template-areas: "sidebar main" "player player";
            grid-template-columns: var(--sidebar-width) 1fr;
            grid-template-rows: 1fr 110px;
            overflow: hidden;
        }

        #sidebar {
            grid-area: sidebar; background: var(--sidebar-bg);
            padding: 20px; border-left: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; gap: 10px;
        }
        .logo { font-size: 22px; font-weight: 900; color: var(--primary); margin-bottom: 15px; }
        .nav-item { padding: 10px 15px; border-radius: 8px; cursor: pointer; color: var(--text-gray); display: flex; align-items: center; gap: 12px; font-weight: 700; transition: 0.2s; }
        .nav-item.active { background: var(--card-hover); color: var(--text-white); }

        #main { grid-area: main; overflow-y: auto; background: linear-gradient(180deg, #122c1e 0%, #050505 40%); }

        .banner-container {
            margin: 20px; padding: 25px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; display: flex; justify-content: space-between;
            align-items: center; backdrop-filter: blur(10px);
        }
        .banner-left { display: flex; align-items: center; gap: 20px; }
        
        /* ☀️ وێنەی خۆرەکە لێرەدایە */
        .sun-spin { 
            width: 120px; height: 120px; 
            animation: rotate-sun 12s infinite linear; 
            filter: drop-shadow(0 0 15px #ffcc00);
            object-fit: contain;
        }

        .header-text h1 { font-size: clamp(28px, 5vw, 60px); font-weight: 900; }
        .hero-img-box img { width: 150px; height: 150px; border-radius: 15px; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .song-list-container { padding: 0 20px; }
        .table-header { display: grid; grid-template-columns: 40px 1fr 150px 80px 40px; padding: 12px 15px; color: var(--text-gray); font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .song-row { display: grid; grid-template-columns: 40px 1fr 150px 80px 40px; padding: 12px 15px; align-items: center; border-radius: 10px; cursor: pointer; margin-bottom: 5px; }
        .song-row:hover { background: var(--card-hover); }
        .song-row.playing { color: var(--primary); background: rgba(29, 185, 84, 0.05); }
        .song-title-group { display: flex; align-items: center; gap: 12px; overflow: hidden; }
        .song-row img { width: 45px; height: 45px; border-radius: 6px; flex-shrink: 0; }

        #player { grid-area: player; background: #000; border-top: 1px solid rgba(255,255,255,0.1); display: grid; grid-template-columns: 1fr 2fr 1fr; padding: 0 20px; align-items: center; }
        .play-btn { width: 48px; height: 48px; background: #fff; border: none; border-radius: 50%; font-size: 22px; cursor: pointer; transition: 0.2s; }
        .play-btn:hover { transform: scale(1.1); }
        .repeat-btn { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; opacity: 0.4; }
        .repeat-btn.active { opacity: 1; color: var(--primary); }
        
        .progress-container { width: 100%; display: flex; align-items: center; gap: 10px; direction: ltr; }
        .progress-bar { flex: 1; height: 5px; background: #333; border-radius: 10px; cursor: pointer; position: relative; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; border-radius: 10px; }

        .view { display: none; }
        .view.active { display: block; }

        /* 📱 Mobile */
        @media (max-width: 768px) {
            body { grid-template-areas: "main" "player" "sidebar"; grid-template-columns: 1fr; grid-template-rows: 1fr 110px 65px; }
            #sidebar { grid-area: sidebar; flex-direction: row; padding: 0; justify-content: space-around; border-top: 1px solid #111; border-left: none; }
            .logo { display: none; }
            .nav-item { flex-direction: column; font-size: 10px; padding: 5px; gap: 4px; }
            .banner-container { margin: 15px; padding: 20px; flex-direction: column; text-align: center; gap: 20px; }
            .banner-left { flex-direction: column; }
            .sun-spin { width: 100px; height: 100px; }
            .table-header, .song-album { display: none; }
            .song-row { grid-template-columns: 30px 1fr 40px; }
            #player { grid-template-columns: 1fr 1fr; }
            .player-right { display: none; }
            .msto-watermark { font-size: 25px; }
        }
    </style>
</head>
<body>

<div class="msto-watermark">مستۆ</div>

<aside id="sidebar">
    <div class="logo">M-CHAVOSHI</div>
    <div class="nav-item active" onclick="showView('home')">🏠 سەرەکی</div>
    <div class="nav-item" onclick="showView('search')">🔍 گەڕان</div>
    <div class="nav-item" onclick="showView('favorites')">❤️ دڵخوازم</div>
</aside>

<main id="main">
    <div id="view-home" class="view active">
        <div class="banner-container">
            <div class="banner-left">
                <img src="sun.png" class="sun-spin" alt="Sun">
                <div class="header-text">
                    <p style="color: var(--primary); font-weight: 900; font-size: 14px;">ARTIST</p>
                    <h1>موحسین چاڤۆشی</h1>
                </div>
            </div>
            <div class="hero-img-box"><img src="music/cover1.jpg" id="heroImg"></div>
        </div>
        <div class="song-list-container">
            <div class="table-header"><span>#</span><span>ناونیشان</span><span>ئەلبوم</span><span>ماوە</span><span></span></div>
            <div id="fullSongList"></div>
        </div>
    </div>

    <div id="view-search" class="view" style="padding: 20px;">
        <input type="text" id="searchInput" placeholder="گەڕان بۆ گۆرانی..." style="width:100%; padding:15px; border-radius:25px; border:none; background:#1a1a1a; color:#fff; outline:none;" oninput="searchMusic(this.value)">
        <div id="searchList" style="margin-top:20px;"></div>
    </div>

    <div id="view-favorites" class="view" style="padding: 20px;">
        <h2 style="margin-bottom: 20px;">❤️ دڵخوازم</h2>
        <div id="favoritesList"></div>
    </div>
</main>

<div id="player">
    <div class="player-info">
        <img src="music/cover1.jpg" id="pThumb" style="width: 50px; height: 50px; border-radius: 8px;">
        <div style="margin-right: 12px;">
            <div id="pTitle" style="font-weight: 700; font-size: 14px;">هەڵبژێرە</div>
            <div style="font-size: 11px; color: var(--text-gray);">موحسین چاڤۆشی</div>
        </div>
    </div>
    <div class="player-controls">
        <div class="control-btns">
            <button class="repeat-btn" id="repeatBtn" onclick="toggleRepeat()">🔁</button>
            <button style="background:none; border:none; color:#fff; font-size:22px; cursor:pointer;" onclick="prevSong()">⏮</button>
            <button class="play-btn" id="masterPlay" onclick="togglePlay()">▶</button>
            <button style="background:none; border:none; color:#fff; font-size:22px; cursor:pointer;" onclick="nextSong()">⏭</button>
        </div>
        <div class="progress-container">
            <span id="cTime" style="font-size: 11px;">٠:٠٠</span>
            <div class="progress-bar" onclick="seek(event)"><div class="progress-fill" id="pFill"></div></div>
            <span id="tTime" style="font-size: 11px;">٠:٠٠</span>
        </div>
    </div>
    <div class="player-right" style="text-align: left;">
        <input type="range" min="0" max="1" step="0.1" value="1" oninput="audio.volume=this.value" style="width: 80px; accent-color: var(--primary);">
    </div>
</div>

<audio id="mainAudio"></audio>

<script>
const songs = [
    { title: "کجایی", album: "Kojaei", cover: "music/cover1.jpg", src: "music/1.mp3", dur: "٣:٥٠" },
    { title: "نفس", album: "Nafas", cover: "music/cover2.jpg", src: "music/2.mp3", dur: "٤:٥٣" },
    { title: "هم خواب", album: "Hamkhab", cover: "music/cover3.jpg", src: "music/3.mp3", dur: "٢:٥٧" },
    { title: "من بیاد میرافتم", album: "Miraftam", cover: "music/cover4.jpg", src: "music/4.mp3", dur: "٣:٤٣" },
    { title: "ملکا", album: "Maleka", cover: "music/cover5.jpg", src: "music/5.mp3", dur: "٤:٢٦" },
    { title: "زنگ زبور", album: "Tanhaye", cover: "music/cover6.jpg", src: "music/6.mp3", dur: "٣:١٧" },
    { title: "فاصلە", album: "Faseleh", cover: "music/cover7.jpg", src: "music/7.mp3", dur: "٥:١٤" },
    { title: "برای گریەهایت", album: "Khodkoshi", cover: "music/cover8.jpg", src: "music/8.mp3", dur: "٥:٣٤" },
    { title: "ساعت دیواری", album: "Saat Divari", cover: "music/cover9.jpg", src: "music/9.mp3", dur: "٣:٣٤" },
    { title: "قاتل حرفه ای", album: "Mohsen & Hamed", cover: "music/cover10.jpg", src: "music/10.mp3", dur: "٤:٢٠" },
    { title: "سر این سفرە", album: "Goldoon", cover: "music/cover11.jpg", src: "music/11.mp3", dur: "٥:٠٥" },
    { title: "ماه خورشید منی", album: "Gandom", cover: "music/cover12.jpg", src: "music/12.mp3", dur: "٤:١٢" },
    { title: "زندانبان", album: "Zendanban", cover: "music/cover13.jpg", src: "music/13.mp3", dur: "٣:٥٧" },
    { title: "پناه", album: "Panah", cover: "music/cover14.jpg", src: "music/14.mp3", dur: "٤:٢٣" },
    { title: "باب دلمی", album: "Babe Delami", cover: "music/cover15.jpg", src: "music/15.mp3", dur: "٣:١٦" },
    { title: "بە رسمی", album: "Yadegar", cover: "music/cover16.jpg", src: "music/16.mp3", dur: "٥:٣١" },
    { title: "برقصا", album: "Beraghsa", cover: "music/cover17.jpg", src: "music/17.mp3", dur: "٤:١٥" },
    { title: "همین مونده بود", album: "Single", cover: "music/cover18.jpg", src: "music/18.mp3", dur: "٣:٢٠" },
    { title: "کجا بودی", album: "Single", cover: "music/cover19.jpg", src: "music/19.mp3", dur: "٣:٤٥" }
];

let cur = -1, isRepeat = false;
let favs = JSON.parse(localStorage.getItem('m_favs')) || [];
const audio = document.getElementById('mainAudio');

function formatTime(sec) {
    if(!sec) return '٠:٠٠';
    let m = Math.floor(sec/60), s = Math.floor(sec%60);
    const map = {'0':'٠','1':'١','2':'٢','3':'٣','4':'٤','5':'٥','6':'٦','7':'٧','8':'٨','9':'٩'};
    return (m + ":" + (s < 10 ? "0" + s : s)).replace(/[0-9]/g, d => map[d]);
}

function createRow(s, i, containerId) {
    const idx = songs.indexOf(s);
    const div = document.createElement('div');
    div.className = `song-row ${idx === cur ? 'playing' : ''}`;
    const isMobile = window.innerWidth <= 768;
    if(isMobile) {
        div.innerHTML = `<span>${i+1}</span><div class="song-title-group" onclick="playIt(${idx})"><img src="${s.cover}"><div style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${s.title}</div></div><div onclick="toggleFav(event, ${idx})">${favs.includes(idx) ? '❤️' : '🤍'}</div>`;
    } else {
        div.innerHTML = `<span>${i+1}</span><div class="song-title-group" onclick="playIt(${idx})"><img src="${s.cover}"><div>${s.title}</div></div><div>${s.album}</div><div>${s.dur}</div><div onclick="toggleFav(event, ${idx})">${favs.includes(idx) ? '❤️' : '🤍'}</div>`;
    }
    document.getElementById(containerId).appendChild(div);
}

function playIt(i) {
    cur = i; audio.src = songs[i].src; audio.play();
    document.getElementById('masterPlay').innerText = '⏸';
    document.getElementById('pTitle').innerText = songs[i].title;
    document.getElementById('pThumb').src = songs[i].cover;
    document.getElementById('heroImg').src = songs[i].cover;
    updateUI();
}

function togglePlay() {
    if(cur === -1) return playIt(0);
    audio.paused ? (audio.play(), document.getElementById('masterPlay').innerText='⏸') : (audio.pause(), document.getElementById('masterPlay').innerText='▶');
}

function toggleRepeat() { isRepeat = !isRepeat; document.getElementById('repeatBtn').classList.toggle('active', isRepeat); }

audio.onended = () => { if (isRepeat) audio.play(); else nextSong(); };

function seek(e) {
    const r = e.currentTarget.getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
}

audio.ontimeupdate = () => {
    if(audio.duration) {
        document.getElementById('pFill').style.width = (audio.currentTime / audio.duration) * 100 + '%';
        document.getElementById('cTime').innerText = formatTime(audio.currentTime);
        document.getElementById('tTime').innerText = formatTime(audio.duration);
    }
};

function nextSong() { playIt((cur + 1) % songs.length); }
function prevSong() { playIt((cur - 1 + songs.length) % songs.length); }

function showView(v) {
    document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
    document.getElementById('view-'+v).classList.add('active');
    updateUI();
}

function toggleFav(e, i) {
    e.stopPropagation();
    favs.includes(i) ? favs = favs.filter(x => x !== i) : favs.push(i);
    localStorage.setItem('m_favs', JSON.stringify(favs));
    updateUI();
}

function searchMusic(q) {
    document.getElementById('searchList').innerHTML = '';
    songs.filter(s => s.title.includes(q)).forEach((s, i) => createRow(s, i, 'searchList'));
}

function updateUI() {
    document.getElementById('fullSongList').innerHTML = '';
    songs.forEach((s, i) => createRow(s, i, 'fullSongList'));
    document.getElementById('favoritesList').innerHTML = '';
    songs.filter((_, i) => favs.includes(i)).forEach((s, i) => createRow(s, i, 'favoritesList'));
}

updateUI();
</script>
</body>
</html>
