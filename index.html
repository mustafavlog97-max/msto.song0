<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موزیک - موحسین چاڤۆشی</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/nizar-nastaliq-kurdish" rel="stylesheet">

    <style>
        :root {
            --primary: #1db954;
            --bg-deep: #050505;
            --sidebar-bg: #000000;
            --card-hover: rgba(255, 255, 255, 0.1);
            --text-white: #ffffff;
            --text-gray: #b3b3b3;
            --sidebar-width: 260px;
        }

        /* 🌈 واتەرمارکی مستۆ RGB */
        .msto-watermark {
            position: fixed; top: 25px; left: 25px;
            font-size: 45px; font-family: 'Nizar Nastaliq Kurdish', serif;
            z-index: 9999; animation: rgb-glow 6s infinite linear;
            pointer-events: none; filter: drop-shadow(0 0 15px rgba(0,0,0,0.5));
        }
        @keyframes rgb-glow {
            0% { color: #ff0000; text-shadow: 0 0 15px #ff0000; }
            33% { color: #00ff00; text-shadow: 0 0 15px #00ff00; }
            66% { color: #0000ff; text-shadow: 0 0 15px #0000ff; }
            100% { color: #ff0000; text-shadow: 0 0 15px #ff0000; }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-white);
            height: 100vh;
            display: grid;
            grid-template-areas: "sidebar main" "player player";
            grid-template-columns: var(--sidebar-width) 1fr;
            grid-template-rows: 1fr 100px;
            overflow: hidden;
        }

        /* Sidebar */
        #sidebar {
            grid-area: sidebar;
            background: var(--sidebar-bg);
            padding: 25px;
            border-left: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .logo { font-size: 24px; font-weight: 900; color: var(--primary); margin-bottom: 20px; }
        .nav-item {
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-gray);
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 700;
            transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { background: var(--card-hover); color: var(--text-white); }

        /* Main Content */
        #main {
            grid-area: main;
            overflow-y: auto;
            background: linear-gradient(180deg, #122c1e 0%, #050505 40%);
            padding-bottom: 40px;
        }

        /* ☀️ بەشی هێدەر و شریتی خۆرەکە */
        .header-box {
            margin: 40px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        .header-info-flex { display: flex; align-items: center; gap: 30px; }
        .header-img { width: 200px; height: 200px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); object-fit: cover; }
        .header-text h1 { font-size: 50px; font-weight: 900; }

        /* خۆرە سوڕاوەکە */
        .sun-spin {
            width: 130px;
            height: 130px;
            animation: rotate-sun 12s infinite linear;
            filter: drop-shadow(0 0 10px #ffcc00);
        }
        @keyframes rotate-sun { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Song List */
        .song-list-container { padding: 0 40px; }
        .table-header {
            display: grid;
            grid-template-columns: 50px 1fr 180px 100px 50px;
            padding: 15px 20px;
            color: var(--text-gray);
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .song-row {
            display: grid;
            grid-template-columns: 50px 1fr 180px 100px 50px;
            padding: 12px 20px;
            align-items: center;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .song-row:hover { background: var(--card-hover); }
        .song-row.playing { color: var(--primary); background: rgba(29, 185, 84, 0.05); }
        .song-title-group { display: flex; align-items: center; gap: 15px; }
        .song-row img { width: 45px; height: 45px; border-radius: 6px; }

        /* Player Bar */
        #player {
            grid-area: player;
            background: #000;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            padding: 0 30px;
            align-items: center;
        }
        .player-controls { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .control-btns { display: flex; align-items: center; gap: 25px; }
        .play-btn { width: 45px; height: 45px; background: #fff; border: none; border-radius: 50%; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .play-btn:hover { transform: scale(1.1); }
        .progress-container { width: 100%; display: flex; align-items: center; gap: 10px; direction: ltr; }
        .progress-bar { flex: 1; height: 5px; background: #333; border-radius: 10px; cursor: pointer; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; border-radius: 10px; }

        .view { display: none; }
        .view.active { display: block; }
        
        #searchInput {
            width: 100%; padding: 15px 25px; border-radius: 30px; border: none;
            background: #1a1a1a; color: #fff; font-family: inherit; margin-bottom: 30px;
        }
    </style>
</head>
<body>

<div class="msto-watermark">مستۆ</div>

<aside id="sidebar">
    <div class="logo">M-CHAVOSHI</div>
    <div class="nav-item active" id="btn-home" onclick="showView('home')">🏠 سەرەکی</div>
    <div class="nav-item" id="btn-search" onclick="showView('search')">🔍 گەڕان</div>
    <div class="nav-item" id="btn-favs" onclick="showView('favorites')">❤️ دڵخوازم</div>
</aside>

<main id="main">
    <div id="view-home" class="view active">
        <div class="header-box">
            <div class="header-info-flex">
                <img src="music/cover1.jpg" id="heroImg" class="header-img">
                <div class="header-text">
                    <p style="color: var(--primary); font-weight: 900;">هونەرمەند</p>
                    <h1>موحسین چاڤۆشی</h1>
                    <p id="totalSongsLabel" style="color: var(--text-gray);"></p>
                </div>
            </div>
            <img src="unnamed-removebg-preview.png" class="sun-spin" alt="Sun">
        </div>
        <div class="song-list-container">
            <div class="table-header"><span>#</span><span>ناونیشان</span><span>ئەلبوم</span><span>ماوە</span><span></span></div>
            <div id="fullSongList"></div>
        </div>
    </div>

    <div id="view-search" class="view" style="padding: 40px;">
        <h2>گەڕان</h2>
        <input type="text" id="searchInput" placeholder="چی دەبیستیت؟" oninput="searchMusic(this.value)">
        <div id="searchList"></div>
    </div>

    <div id="view-favorites" class="view" style="padding: 40px;">
        <h2>❤️ دڵخوازم</h2>
        <div id="favoritesList" style="margin-top: 20px;"></div>
    </div>
</main>

<div id="player">
    <div class="player-info">
        <img src="music/cover1.jpg" id="pThumb" style="width: 55px; height: 55px; border-radius: 8px;">
        <div>
            <div id="pTitle" style="font-weight: 700; font-size: 15px;">گۆرانیەک هەڵبژێرە</div>
            <div style="font-size: 12px; color: var(--text-gray);">موحسین چاڤۆشی</div>
        </div>
    </div>
    <div class="player-controls">
        <div class="control-btns">
            <button style="background:none; border:none; color:#fff; font-size:20px; cursor:pointer;" onclick="prevSong()">⏮</button>
            <button class="play-btn" id="masterPlay" onclick="togglePlay()">▶</button>
            <button style="background:none; border:none; color:#fff; font-size:20px; cursor:pointer;" onclick="nextSong()">⏭</button>
        </div>
        <div class="progress-container">
            <span id="cTime">٠:٠٠</span>
            <div class="progress-bar" onclick="seek(event)"><div class="progress-fill" id="pFill"></div></div>
            <span id="tTime">٠:٠٠</span>
        </div>
    </div>
    <div style="text-align: left;">🔊 <input type="range" class="vol-slider" min="0" max="1" step="0.05" value="1" oninput="audio.volume=this.value"></div>
</div>

<audio id="mainAudio"></audio>

<script>
const songs = [
    { title: "کجایی", album: "Kojaei", cover: "music/cover1.jpg", src: "music/1.mp3", dur: "٣:٥٠" },
    { title: "نفس", album: "Nafas", cover: "music/cover2.jpg", src: "music/2.mp3", dur: "٤:٥٣" },
    { title: "هم خواب", album: "Hamkhab", cover: "music/cover3.jpg", src: "music/3.mp3", dur: "٢:٥٧" },
    { title: "من بیاد میرافتم", album: "Miraftam", cover: "music/cover4.jpg", src: "music/4.mp3", dur: "٣:٤٣" },
    { title: "ملکا", album: "Maleka", cover: "music/cover5.jpg", src: "music/5.mp3", dur: "٤:٢٦" },
    { title: "زنگ زبور", album: "Tanhaye", cover: "music/cover6.jpg", src: "music/6.mp3", dur: "٣:١٧" },
    { title: "فاصلە", album: "Faseleh", cover: "music/cover7.jpg", src: "music/7.mp3", dur: "٥:١٤" },
    { title: "برای گریەهایت", album: "Khodkoshi", cover: "music/cover8.jpg", src: "music/8.mp3", dur: "٥:٣٤" },
    { title: "ساعت دیواری", album: "Saat Divari", cover: "music/cover9.jpg", src: "music/9.mp3", dur: "٣:٣٤" },
    { title: "قاتل حرفه ای", album: "Mohsen & Hamed", cover: "music/cover10.jpg", src: "music/10.mp3", dur: "٤:٢٠" },
    { title: "سر این سفرە", album: "Goldoon", cover: "music/cover11.jpg", src: "music/11.mp3", dur: "٥:٠٥" },
    { title: "ماه خورشید منی", album: "Gandom", cover: "music/cover12.jpg", src: "music/12.mp3", dur: "٤:١٢" },
    { title: "زندانبان", album: "Zendanban", cover: "music/cover13.jpg", src: "music/13.mp3", dur: "٣:٥٧" },
    { title: "پناه", album: "Panah", cover: "music/cover14.jpg", src: "music/14.mp3", dur: "٤:٢٣" },
    { title: "باب دلمی", album: "Babe Delami", cover: "music/cover15.jpg", src: "music/15.mp3", dur: "٣:١٦" },
    { title: "بە رسمی", album: "Yadegar", cover: "music/cover16.jpg", src: "music/16.mp3", dur: "٥:٣١" },
    { title: "برقصا", album: "Beraghsa", cover: "music/cover17.jpg", src: "music/17.mp3", dur: "٤:١٥" },
    { title: "همین مونده بود", album: "Single", cover: "music/cover18.jpg", src: "music/18.mp3", dur: "٣:٢٠" },
    { title: "کجا بودی", album: "Single", cover: "music/cover19.jpg", src: "music/19.mp3", dur: "٣:٤٥" }
];

let cur = -1;
let favs = JSON.parse(localStorage.getItem('m_favs')) || [];
const audio = document.getElementById('mainAudio');

function formatTime(sec) {
    if(!sec) return '٠:٠٠';
    let m = Math.floor(sec / 60), s = Math.floor(sec % 60);
    const map = {'0':'٠','1':'١','2':'٢','3':'٣','4':'٤','5':'٥','6':'٦','7':'٧','8':'٨','9':'٩'};
    return (m + ":" + (s < 10 ? "0" + s : s)).replace(/[0-9]/g, d => map[d]);
}

function createRow(s, i, containerId) {
    const realIdx = songs.indexOf(s);
    const div = document.createElement('div');
    div.className = `song-row ${realIdx === cur ? 'playing' : ''}`;
    div.innerHTML = `
        <span>${i+1}</span>
        <div class="song-title-group" onclick="playIt(${realIdx})">
            <img src="${s.cover}"> <div>${s.title}</div>
        </div>
        <div>${s.album}</div>
        <div>${s.dur}</div>
        <div onclick="toggleFav(event, ${realIdx})">${favs.includes(realIdx) ? '❤️' : '🤍'}</div>
    `;
    document.getElementById(containerId).appendChild(div);
}

function playIt(i) {
    cur = i; audio.src = songs[i].src; audio.play();
    document.getElementById('masterPlay').innerText = '⏸';
    document.getElementById('pTitle').innerText = songs[i].title;
    document.getElementById('pThumb').src = songs[i].cover;
    document.getElementById('heroImg').src = songs[i].cover;
    updateUI();
}

function togglePlay() {
    if(cur === -1) return playIt(0);
    audio.paused ? (audio.play(), document.getElementById('masterPlay').innerText='⏸') : (audio.pause(), document.getElementById('masterPlay').innerText='▶');
}

function seek(e) {
    const r = e.currentTarget.getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
}

audio.ontimeupdate = () => {
    if(audio.duration) {
        document.getElementById('pFill').style.width = (audio.currentTime / audio.duration) * 100 + '%';
        document.getElementById('cTime').innerText = formatTime(audio.currentTime);
        document.getElementById('tTime').innerText = formatTime(audio.duration);
    }
};

function nextSong() { playIt((cur + 1) % songs.length); }
function prevSong() { playIt((cur - 1 + songs.length) % songs.length); }

function showView(v) {
    document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
    document.getElementById('view-'+v).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
    document.getElementById('btn-'+(v==='home'?'home':v==='search'?'search':'favs')).classList.add('active');
    updateUI();
}

function toggleFav(e, i) {
    e.stopPropagation();
    favs.includes(i) ? favs = favs.filter(x => x !== i) : favs.push(i);
    localStorage.setItem('m_favs', JSON.stringify(favs));
    updateUI();
}

function searchMusic(q) {
    document.getElementById('searchList').innerHTML = '';
    songs.filter(s => s.title.includes(q)).forEach((s, i) => createRow(s, i, 'searchList'));
}

function updateUI() {
    document.getElementById('fullSongList').innerHTML = '';
    songs.forEach((s, i) => createRow(s, i, 'fullSongList'));
    document.getElementById('favoritesList').innerHTML = '';
    songs.filter((_, i) => favs.includes(i)).forEach((s, i) => createRow(s, i, 'favoritesList'));
}

document.getElementById('totalSongsLabel').innerText = songs.length + " گۆرانی بڵاوکراوە";
updateUI();
</script>
</body>
</html>
