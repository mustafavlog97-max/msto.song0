<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موزیک - موحسین چاڤۆشی</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* 🖋️ شێوازی نوێ بۆ بانگکردنی فۆنتی نەستەعلیق بۆ مۆبایل */
  @import url('https://fonts.cdnfonts.com/css/nizar-nastaliq-kurdish');

  :root {
    --bg-primary: #0a0a0a;
    --bg-secondary: #111111;
    --bg-tertiary: #1a1a1a;
    --bg-hover: #222222;
    --green: #1db954;
    --green-bright: #1ed760;
    --green-dim: #158a3e;
    --text-primary: #ffffff;
    --text-secondary: #a0a0a0;
    --text-dim: #555555;
    --border: #2a2a2a;
    --bar-height: 90px;
    --sidebar-width: 240px;
  }

  /* 🌈 RGB Watermark Style - مستۆ */
  .msto-rgb-watermark {
      position: fixed;
      top: 15px; 
      left: 20px; 
      font-size: 42px; 
      /* لێرە ناوی فۆنتەکە بە وردی دانراوە */
      font-family: 'Nizar Nastaliq Kurdish', 'Nizar Nastaliq', serif !important;
      z-index: 9999; 
      pointer-events: none;
      animation: rgb-text 5s infinite linear;
      direction: rtl;
      filter: drop-shadow(0 0 12px rgba(0,0,0,0.9));
  }

  @keyframes rgb-text {
      0% { color: #ff0000; text-shadow: 0 0 10px rgba(255,0,0,0.7); }
      20% { color: #ff00ff; text-shadow: 0 0 10px rgba(255,0,255,0.7); }
      40% { color: #0000ff; text-shadow: 0 0 10px rgba(0,0,255,0.7); }
      60% { color: #00ffff; text-shadow: 0 0 10px rgba(0,255,255,0.7); }
      80% { color: #00ff00; text-shadow: 0 0 10px rgba(0,255,0,0.7); }
      100% { color: #ff0000; text-shadow: 0 0 10px rgba(255,0,0,0.7); }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Naskh Arabic', serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-rows: 1fr var(--bar-height);
    grid-template-columns: var(--sidebar-width) 1fr;
    grid-template-areas: "sidebar main" "player player";
  }

  #sidebar { grid-area: sidebar; background: #000; border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 0; overflow-y: auto; }
  .logo { padding: 0 20px 28px; font-size: 22px; font-weight: 700; color: var(--green); display: flex; align-items: center; gap: 10px; }
  .nav-section { padding: 0 12px; margin-bottom: 8px; }
  .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 12px; border-radius: 8px; cursor: pointer; color: var(--text-secondary); transition: 0.15s; text-decoration: none; }
  .nav-item:hover { color: var(--text-primary); background: var(--bg-hover); }
  .nav-item.active { color: var(--text-primary); background: var(--bg-tertiary); }
  .sidebar-divider { border: none; border-top: 1px solid var(--border); margin: 16px 20px; }
  .playlist-label { padding: 4px 24px 12px; font-size: 11px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; }
  .playlist-item { padding: 10px 24px; color: var(--text-secondary); font-size: 14px; cursor: pointer; border-radius: 4px; margin: 0 8px; transition: color 0.15s; }

  #main { grid-area: main; background: linear-gradient(180deg, #0d2818 0%, #0a0a0a 35%); overflow-y: auto; padding-bottom: 20px; }
  .main-header { padding: 32px; display: flex; align-items: flex-end; gap: 24px; }
  .artist-cover { width: 200px; height: 200px; border-radius: 12px; object-fit: cover; box-shadow: 0 20px 60px rgba(0,0,0,0.8); background: var(--bg-tertiary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 60px; }
  .artist-info h1 { font-size: 48px; font-weight: 700; margin-bottom: 8px; }
  .controls-row { padding: 24px 32px; }
  .btn-play-main { width: 56px; height: 56px; background: var(--green); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(29,185,84,0.4); }

  .table-header { display: grid; grid-template-columns: 48px 40px 1fr 200px 100px 60px; padding: 8px 32px; color: var(--text-dim); font-size: 12px; border-bottom: 1px solid var(--border); }
  
  .song-row {
      display: grid;
      grid-template-columns: 48px 40px 1fr 200px 100px 60px;
      padding: 8px 32px;
      align-items: center;
      border-radius: 6px;
      margin: 0 8px;
      cursor: pointer;
      transition: background 0.1s;
  }
  .song-row:hover { background: var(--bg-hover); }
  .song-row.playing { color: var(--green); }

  .heart-icon { fill: none; stroke: #a0a0a0; stroke-width: 2; transition: 0.2s; cursor: pointer; }
  .heart-icon.active { fill: #1db954; stroke: #1db954; }

  .song-num { color: var(--text-secondary); text-align: center; }
  .song-info { display: flex; align-items: center; gap: 14px; }
  .song-thumb { width: 42px; height: 42px; border-radius: 6px; overflow: hidden; background: var(--bg-tertiary); display: flex; align-items: center; justify-content: center; }
  .song-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
  .song-title { font-size: 15px; font-weight: 500; }
  .song-artist { font-size: 13px; color: var(--text-secondary); }
  .song-album, .song-duration { color: var(--text-secondary); font-size: 14px; }

  #player { grid-area: player; background: #0d0d0d; border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center; padding: 0 20px; }
  .player-song { display: flex; align-items: center; gap: 14px; }
  .player-thumb { width: 56px; height: 56px; border-radius: 8px; background: var(--bg-tertiary); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .player-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .player-center { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .player-controls { display: flex; align-items: center; gap: 20px; }
  .ctrl-btn { background: none; border: none; cursor: pointer; color: var(--text-secondary); }
  .btn-play-bar { width: 40px; height: 40px; background: #fff; border-radius: 50%; color: #000; display: flex; align-items: center; justify-content: center; }
  .progress-row { width: 100%; display: flex; align-items: center; gap: 10px; }
  .progress-bar-wrap { flex: 1; height: 4px; background: var(--bg-hover); border-radius: 2px; cursor: pointer; position: relative; }
  .progress-fill { height: 100%; background: var(--text-secondary); border-radius: 2px; }
  .player-right { display: flex; justify-content: flex-end; }
  .volume-row { display: flex; align-items: center; gap: 8px; }
  .volume-bar-wrap { width: 90px; height: 4px; background: var(--bg-hover); border-radius: 2px; }
  .volume-fill { height: 100%; background: var(--text-secondary); width: 70%; }

  .views { display: none; }
  .views.active { display: block; }

  /* 📱 مۆبایل - Responsive Design */
  @media (max-width: 768px) {
    body { grid-template-columns: 1fr; grid-template-areas: "main" "player"; }
    #sidebar { display: none; }
    .main-header { padding: 20px; flex-direction: column; align-items: center; text-align: center; }
    .artist-cover { width: 140px; height: 140px; }
    .artist-info h1 { font-size: 26px; }
    .table-header { display: none; }
    .song-row { grid-template-columns: 30px 40px 1fr 60px; padding: 12px 10px; margin: 0 5px; }
    .song-album { display: none; }
    .player-right, .progress-row { display: none; }
    #player { grid-template-columns: 1fr 1fr; }
    /* ناوەکە لە مۆبایل کەمێک بچووکتر بێت */
    .msto-rgb-watermark { font-size: 32px; top: 10px; left: 15px; }
  }
</style>
</head>
<body>

<div class="msto-rgb-watermark">مستۆ</div>

<aside id="sidebar">
  <div class="logo">🎵 گۆرانیەکان</div>
  <nav class="nav-section">
    <a class="nav-item active" onclick="showView('home')">سەرەکی</a>
    <a class="nav-item" onclick="showView('search')">گەڕان</a>
    <a class="nav-item" onclick="showView('favorites')">دڵخوازم</a>
  </nav>
  <hr class="sidebar-divider">
  <div class="playlist-label">پلەیلیستەکانم</div>
  <div class="playlist-item">چاڤۆشی - باشترینەکان</div>
</aside>

<main id="main">
  <div id="view-home" class="views active">
    <div class="main-header">
      <div class="artist-cover" id="mainCover">🎵</div>
      <div class="artist-info">
        <h1>موحسین چاڤۆشی</h1>
        <p id="songCountLabel">٠ گۆرانی</p>
      </div>
    </div>
    <div class="controls-row">
      <button class="btn-play-main" onclick="togglePlay()">▶</button>
    </div>
    <div class="table-header">
      <span>#</span>
      <span></span>
      <span>ناونیشان</span>
      <span>ئەلبوم</span>
      <span style="text-align:center">ماوە</span>
      <span></span>
    </div>
    <div id="songList"></div>
  </div>

  <div id="view-search" class="views" style="display:none;">
      <h2 style="padding:20px;">گەڕان</h2>
      <input type="text" style="margin:0 20px; padding:10px; width:80%;" placeholder="گەڕان..." oninput="filterSongs(this.value)">
  </div>

  <div id="view-favorites" class="views" style="padding:20px;">
      <h2>دڵخوازەکانم</h2>
      <div id="favoritesList"></div>
  </div>
</main>

<div id="player">
  <div class="player-song">
    <div class="player-thumb" id="playerThumb">🎵</div>
    <div class="player-song-text">
      <div class="player-title" id="playerTitle">گۆرانیەک هەڵبژێرە</div>
      <div class="player-artist">موحسین چاڤۆشی</div>
    </div>
  </div>
  <div class="player-center">
    <div class="player-controls">
      <button class="ctrl-btn" onclick="prevSong()">⏮</button>
      <button class="ctrl-btn btn-play-bar" onclick="togglePlay()" id="playPauseBtn">▶</button>
      <button class="ctrl-btn" onclick="nextSong()">⏭</button>
    </div>
    <div class="progress-row">
      <span class="time-label" id="currentTime">٠:٠٠</span>
      <div class="progress-bar-wrap" onclick="seekTo(event)"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="time-label" id="totalTime">٠:٠٠</span>
    </div>
  </div>
  <div class="player-right">
      <div class="volume-row">
          <div class="volume-bar-wrap"><div class="volume-fill"></div></div>
      </div>
  </div>
</div>

<audio id="audioPlayer"></audio>

<script>
const songs = [
  { title: "کجای", album: "kojaei", cover: "music/cover1.jpg", audioSrc: "music/1.mp3", duration: "٣:٥٠" },
  { title: "نفس", album: "nafas", cover: "music/cover2.jpg", audioSrc: "music/2.mp3", duration: "٤:٥٣" },
  { title: "هم خواب", album: "Hamkhab", cover: "music/cover3.jpg", audioSrc: "music/3.mp3", duration: "٢:٥٧" },
  { title: "من بیاد میرافتم", album: "Man Bayad Miraftam", cover: "music/cover4.jpg", audioSrc: "music/4.mp3", duration: "٣:٤٣" },
  { title: "ملکا", album: "maleka", cover: "music/cover5.jpg", audioSrc: "music/5.mp3", duration: "٤:٢٦" },
  { title: "زنگ زبور", album: "tanhaye", cover: "music/cover6.jpg", audioSrc: "music/6.mp3", duration: "٣:١٧" },
  { title: "فاصلە", album: "faseleh", cover: "music/cover7.jpg", audioSrc: "music/7.mp3", duration: "٥:١٤" },
];

const audio = document.getElementById('audioPlayer');
let currentIdx = -1;
let isPlaying = false;
let favorites = JSON.parse(localStorage.getItem('mchavoshi_favs')) || [];

function toKurdishNums(n) {
  const map = {'0':'٠','1':'١','2':'٢','3':'٣','4':'٤','5':'٥','6':'٦','7':'٧','8':'٨','9':'٩'};
  return String(n).replace(/[0-9]/g, d => map[d]);
}

function formatTime(sec) {
  if (isNaN(sec)) return '٠:٠٠';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return toKurdishNums(m) + ':' + (s < 10 ? '٠' : '') + toKurdishNums(s);
}

function getCoverHTML(song, size=42) {
  return song.cover ? `<img src="${song.cover}" style="width:${size}px;height:${size}px;border-radius:6px;object-fit:cover;">` : '🎵';
}

function renderSongs(list, containerId) {
  const container = document.getElementById(containerId);
  if(!container) return;
  container.innerHTML = '';
  list.forEach((song, i) => {
    const idx = songs.indexOf(song);
    const isActive = idx === currentIdx;
    const isFav = favorites.includes(idx);
    const row = document.createElement('div');
    row.className = 'song-row' + (isActive ? ' playing' : '');
    
    row.innerHTML = `
      <div class="song-num">${toKurdishNums(i+1)}</div>
      <div class="song-fav" onclick="toggleFavorite(event, ${idx})">
          <svg class="heart-icon ${isFav ? 'active' : ''}" viewBox="0 0 24 24" width="20" height="20">
              <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
      </div>
      <div class="song-info" onclick="playSong(${idx})">
        <div class="song-thumb">${getCoverHTML(song, 42)}</div>
        <div class="song-text">
          <div class="song-title">${song.title}</div>
          <div class="song-artist">موحسین چاڤۆشی</div>
        </div>
      </div>
      <div class="song-album">${song.album}</div>
      <div class="song-duration">${song.duration}</div>
      <div></div>
    `;
    container.appendChild(row);
  });
}

function toggleFavorite(event, idx) {
    event.stopPropagation();
    const fIdx = favorites.indexOf(idx);
    if (fIdx > -1) { favorites.splice(fIdx, 1); }
    else { favorites.push(idx); }
    localStorage.setItem('mchavoshi_favs', JSON.stringify(favorites));
    renderSongs(songs, 'songList');
    renderFavorites();
}

function renderFavorites() {
    const favSongs = songs.filter((_, index) => favorites.includes(index));
    renderSongs(favSongs, 'favoritesList');
}

function playSong(idx) {
  currentIdx = idx;
  audio.src = songs[idx].audioSrc;
  audio.play();
  isPlaying = true;
  updateUI();
}

function updateUI() {
  const song = songs[currentIdx];
  document.getElementById('playerTitle').textContent = song.title;
  document.getElementById('playerThumb').innerHTML = getCoverHTML(song, 56);
  document.getElementById('mainCover').innerHTML = getCoverHTML(song, 200);
  renderSongs(songs, 'songList');
}

function togglePlay() {
  if (currentIdx === -1) { playSong(0); return; }
  if (isPlaying) { audio.pause(); isPlaying = false; }
  else { audio.play(); isPlaying = true; }
  renderSongs(songs, 'songList');
}

function nextSong() { playSong((currentIdx + 1) % songs.length); }
function prevSong() { playSong((currentIdx - 1 + songs.length) % songs.length); }

audio.addEventListener('timeupdate', () => {
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
  document.getElementById('totalTime').textContent = formatTime(audio.duration);
});

function showView(name) {
  document.querySelectorAll('.views').forEach(v => v.style.display = 'none');
  const view = document.getElementById('view-' + name);
  if(view) view.style.display = 'block';
  if(name === 'favorites') renderFavorites();
}

document.getElementById('songCountLabel').textContent = toKurdishNums(songs.length) + ' گۆرانی';
renderSongs(songs, 'songList');
</script>
</body>
</html>
