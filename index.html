<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موزیک - موحسین چاڤۆشی</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/nizar-nastaliq-kurdish" rel="stylesheet">

    <style>
        :root {
            --primary: #1db954;
            --bg-deep: #050505;
            --sidebar-bg: #000000;
            --card-hover: rgba(255, 255, 255, 0.1);
            --text-white: #ffffff;
            --text-gray: #b3b3b3;
            --sidebar-width: 260px;
        }

        /* 🌈 واتەرمارکی مستۆ RGB */
        .msto-watermark {
            position: fixed;
            top: 25px;
            left: 25px;
            font-size: 45px;
            font-family: 'Nizar Nastaliq Kurdish', serif;
            z-index: 9999;
            animation: rgb-glow 6s infinite linear;
            pointer-events: none;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }
        @keyframes rgb-glow {
            0% { color: #ff0000; text-shadow: 0 0 15px #ff0000; }
            33% { color: #00ff00; text-shadow: 0 0 15px #00ff00; }
            66% { color: #0000ff; text-shadow: 0 0 15px #0000ff; }
            100% { color: #ff0000; text-shadow: 0 0 15px #ff0000; }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-white);
            height: 100vh;
            display: grid;
            grid-template-areas: "sidebar main" "player player";
            grid-template-columns: var(--sidebar-width) 1fr;
            grid-template-rows: 1fr 100px;
            overflow: hidden;
        }

        /* Sidebar - مێنیوی لای چەپ */
        #sidebar {
            grid-area: sidebar;
            background: var(--sidebar-bg);
            padding: 25px;
            border-left: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .logo { font-size: 24px; font-weight: 900; color: var(--primary); margin-bottom: 20px; }
        .nav-item {
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-gray);
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 700;
            transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { background: var(--card-hover); color: var(--text-white); }

        /* Main Content */
        #main {
            grid-area: main;
            overflow-y: auto;
            background: linear-gradient(180deg, #122c1e 0%, #050505 40%);
            padding-bottom: 40px;
        }
        .header-content {
            padding: 80px 40px 40px;
            display: flex;
            align-items: flex-end;
            gap: 30px;
        }
        .header-img {
            width: 230px; height: 230px;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            object-fit: cover;
        }
        .header-text h1 { font-size: 70px; font-weight: 900; margin-bottom: 10px; }

        /* Song Table */
        .song-list-container { padding: 0 40px; }
        .table-header {
            display: grid;
            grid-template-columns: 50px 1fr 180px 100px 50px;
            padding: 15px 20px;
            color: var(--text-gray);
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .song-row {
            display: grid;
            grid-template-columns: 50px 1fr 180px 100px 50px;
            padding: 12px 20px;
            align-items: center;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .song-row:hover { background: var(--card-hover); }
        .song-row.playing { color: var(--primary); }
        .song-title-group { display: flex; align-items: center; gap: 15px; }
        .song-row img { width: 45px; height: 45px; border-radius: 6px; }

        /* Player Bar */
        #player {
            grid-area: player;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            padding: 0 30px;
            align-items: center;
        }
        .player-info { display: flex; align-items: center; gap: 15px; }
        .player-controls { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .control-btns { display: flex; align-items: center; gap: 25px; }
        .play-btn { 
            width: 45px; height: 45px; background: #fff; border: none; 
            border-radius: 50%; font-size: 20px; cursor: pointer;
            transition: 0.2s;
        }
        .play-btn:hover { transform: scale(1.1); }
        .progress-container { width: 100%; display: flex; align-items: center; gap: 10px; }
        .progress-bar { flex: 1; height: 5px; background: #333; border-radius: 10px; cursor: pointer; position: relative; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; border-radius: 10px; }

        /* 📱 Mobile - گۆڕانکاری بۆ مۆبایل */
        @media (max-width: 768px) {
            body {
                grid-template-areas: "main" "player" "sidebar";
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 90px 70px;
            }
            #sidebar {
                grid-area: sidebar;
                flex-direction: row;
                padding: 0;
                justify-content: space-around;
                align-items: center;
                border-top: 1px solid rgba(255,255,255,0.1);
            }
            .logo, .sidebar-divider { display: none; }
            .nav-item { flex-direction: column; font-size: 11px; padding: 10px; gap: 5px; }
            .header-content { flex-direction: column; align-items: center; text-align: center; padding: 40px 20px; }
            .header-img { width: 160px; height: 160px; }
            .header-text h1 { font-size: 32px; }
            .table-header, .song-album { display: none; }
            .song-row { grid-template-columns: 30px 1fr 80px 40px; padding: 10px; }
            #player { grid-template-columns: 1fr 1fr; }
            .player-right { display: none; }
            .msto-watermark { font-size: 30px; top: 15px; left: 15px; }
        }

        .view { display: none; }
        .view.active { display: block; }
    </style>
</head>
<body>

<div class="msto-watermark">مستۆ</div>

<aside id="sidebar">
    <div class="logo">M-CHAVOSHI</div>
    <div class="nav-item active" id="btn-home" onclick="showView('home')">🏠 سەرەکی</div>
    <div class="nav-item" id="btn-search" onclick="showView('search')">🔍 گەڕان</div>
    <div class="nav-item" id="btn-favs" onclick="showView('favorites')">❤️ دڵخوازم</div>
</aside>

<main id="main">
    <div id="view-home" class="view active">
        <div class="header-content">
            <img src="music/cover1.jpg" id="heroImg" class="header-img">
            <div class="header-text">
                <p style="text-transform: uppercase; font-size: 12px; font-weight: 900;">Artist</p>
                <h1>موحسین چاڤۆشی</h1>
                <p id="totalSongsLabel" style="color: var(--text-gray);">٠ گۆرانی</p>
            </div>
        </div>

        <div class="song-list-container">
            <div class="table-header">
                <span>#</span><span>ناونیشان</span><span>ئەلبوم</span><span>ماوە</span><span></span>
            </div>
            <div id="fullSongList"></div>
        </div>
    </div>

    <div id="view-search" class="view" style="padding: 40px;">
        <h2 style="margin-bottom: 20px;">گەڕان</h2>
        <input type="text" id="searchInput" placeholder="چی دەبیستیت؟" 
               style="width: 100%; padding: 15px 25px; border-radius: 30px; border: none; background: var(--card-hover); color: #fff; font-family: inherit;"
               oninput="searchMusic(this.value)">
        <div id="searchList" style="margin-top: 20px;"></div>
    </div>

    <div id="view-favorites" class="view" style="padding: 40px;">
        <h2 style="margin-bottom: 20px;">❤️ دڵخوازم</h2>
        <div id="favoritesList"></div>
    </div>
</main>

<div id="player">
    <div class="player-info">
        <img src="music/cover1.jpg" id="pThumb" style="width: 55px; height: 55px; border-radius: 8px;">
        <div>
            <div id="pTitle" style="font-weight: 700; font-size: 15px;">گۆرانیەک هەڵبژێرە</div>
            <div style="font-size: 12px; color: var(--text-gray);">موحسین چاڤۆشی</div>
        </div>
    </div>

    <div class="player-controls">
        <div class="control-btns">
            <button style="background:none; border:none; color:#fff; font-size:20px; cursor:pointer;" onclick="prevSong()">⏮</button>
            <button class="play-btn" id="masterPlay" onclick="togglePlay()">▶</button>
            <button style="background:none; border:none; color:#fff; font-size:20px; cursor:pointer;" onclick="nextSong()">⏭</button>
        </div>
        <div class="progress-container">
            <span id="cTime" style="font-size: 11px;">٠:٠٠</span>
            <div class="progress-bar" onclick="seek(event)"><div class="progress-fill" id="pFill"></div></div>
            <span id="tTime" style="font-size: 11px;">٠:٠٠</span>
        </div>
    </div>

    <div class="player-right" style="text-align: left;">🔊</div>
</div>

<audio id="mainAudio"></audio>

<script>
const songs = [
    { title: "کجایی", album: "Kojaei", cover: "music/cover1.jpg", src: "music/1.mp3", dur: "٣:٥٠" },
    { title: "نفس", album: "Nafas", cover: "music/cover2.jpg", src: "music/2.mp3", dur: "٤:٥٣" },
    { title: "هم خواب", album: "Hamkhab", cover: "music/cover3.jpg", src: "music/3.mp3", dur: "٢:٥٧" },
    { title: "من بیاد میرافتم", album: "Man Bayad Miraftam", cover: "music/cover4.jpg", src: "music/4.mp3", dur: "٣:٤٣" },
    { title: "ملکا", album: "Maleka", cover: "music/cover5.jpg", src: "music/5.mp3", dur: "٤:٢٦" },
    { title: "زنگ زبور", album: "Tanhaye", cover: "music/cover6.jpg", src: "music/6.mp3", dur: "٣:١٧" },
    { title: "فاصلە", album: "Faseleh", cover: "music/cover7.jpg", src: "music/7.mp3", dur: "٥:١٤" },
    { title: "برای گریەهایت", album: "Khodkoshi Mamnoo", cover: "music/cover8.jpg", src: "music/8.mp3", dur: "٥:٣٤" },
    { title: "ساعت دیواری", album: "Saat Divari", cover: "music/cover9.jpg", src: "music/9.mp3", dur: "٣:٣٤" },
    { title: "قاتل حرفه ای", album: "Mohsen & Hamed", cover: "music/cover10.jpg", src: "music/10.mp3", dur: "٤:٢٠" },
    { title: "سر این سفرە", album: "Goldoon", cover: "music/cover11.jpg", src: "music/11.mp3", dur: "٥:٠٥" },
    { title: "ماه خورشید منی", album: "Gandom Goon", cover: "music/cover12.jpg", src: "music/12.mp3", dur: "٤:١٢" },
    { title: "زندانبان", album: "Zendanban", cover: "music/cover13.jpg", src: "music/13.mp3", dur: "٣:٥٧" },
    { title: "پناه", album: "Panah", cover: "music/cover14.jpg", src: "music/14.mp3", dur: "٤:٢٣" },
    { title: "باب دلمی", album: "Babe Delami", cover: "music/cover15.jpg", src: "music/15.mp3", dur: "٣:١٦" },
    { title: "به رسمی", album: "Be Rasme Yadegar", cover: "music/cover16.jpg", src: "music/16.mp3", dur: "٥:٣١" }
    { title: "برقصا", album: "Beraghsa ", cover: "music/cover17.jpg", src: "music/17.mp3", dur: "٤:١٥" }
    
];

let cur = -1;
let favs = JSON.parse(localStorage.getItem('m_favs')) || [];
const audio = document.getElementById('mainAudio');

function createRow(s, i, listId) {
    const realIdx = songs.indexOf(s);
    const isFav = favs.includes(realIdx);
    const div = document.createElement('div');
    div.className = `song-row ${realIdx === cur ? 'playing' : ''}`;
    div.innerHTML = `
        <span style="color:var(--text-gray)">${i+1}</span>
        <div class="song-title-group" onclick="playIt(${realIdx})">
            <img src="${s.cover}">
            <div>${s.title}</div>
        </div>
        <div class="song-album">${s.album}</div>
        <div>${s.dur}</div>
        <div onclick="toggleFav(event, ${realIdx})">${isFav ? '❤️' : '🤍'}</div>
    `;
    document.getElementById(listId).appendChild(div);
}

function playIt(i) {
    cur = i;
    audio.src = songs[i].src;
    audio.play();
    document.getElementById('masterPlay').innerText = '⏸';
    document.getElementById('pTitle').innerText = songs[i].title;
    document.getElementById('pThumb').src = songs[i].cover;
    document.getElementById('heroImg').src = songs[i].cover;
    updateAllLists();
}

function togglePlay() {
    if(cur === -1) return playIt(0);
    if(audio.paused) { audio.play(); document.getElementById('masterPlay').innerText = '⏸'; }
    else { audio.pause(); document.getElementById('masterPlay').innerText = '▶'; }
}

function showView(v) {
    document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
    document.getElementById('view-'+v).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
    document.getElementById('btn-'+(v==='home'?'home':v==='search'?'search':'favs')).classList.add('active');
    if(v === 'favorites') updateFavList();
}

function toggleFav(e, i) {
    e.stopPropagation();
    if(favs.includes(i)) favs = favs.filter(x => x !== i);
    else favs.push(i);
    localStorage.setItem('m_favs', JSON.stringify(favs));
    updateAllLists();
}

function searchMusic(q) {
    document.getElementById('searchList').innerHTML = '';
    songs.filter(s => s.title.includes(q)).forEach((s, i) => createRow(s, i, 'searchList'));
}

function nextSong() { playIt((cur + 1) % songs.length); }
function prevSong() { playIt((cur - 1 + songs.length) % songs.length); }

audio.ontimeupdate = () => {
    const p = (audio.currentTime / audio.duration) * 100;
    document.getElementById('pFill').style.width = p + '%';
};

function seek(e) {
    const r = e.currentTarget.getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
}

function updateFavList() {
    document.getElementById('favoritesList').innerHTML = '';
    songs.filter((_, i) => favs.includes(i)).forEach((s, i) => createRow(s, i, 'favoritesList'));
}

function updateAllLists() {
    document.getElementById('fullSongList').innerHTML = '';
    songs.forEach((s, i) => createRow(s, i, 'fullSongList'));
    if(document.getElementById('view-favorites').classList.contains('active')) updateFavList();
}

document.getElementById('totalSongsLabel').innerText = songs.length + ' گۆرانی';
updateAllLists();
</script>
</body>
</html>
