<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-CHAVOSHI | موزیک و ڕەسەنایەتی</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/nizar-nastaliq-kurdish" rel="stylesheet">

    <style>
        :root {
            --primary: #1db954;
            --bg-dark: #050505;
            --sidebar-bg: #000000;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-white: #ffffff;
            --text-gray: #b3b3b3;
            --sidebar-width: 280px;
        }

        /* 🌈 واتەرمارکی مستۆ RGB */
        .msto-watermark {
            position: fixed; top: 25px; left: 25px;
            font-size: 50px; font-family: 'Nizar Nastaliq Kurdish', serif;
            z-index: 99999; animation: rgb-glow 6s infinite linear;
            pointer-events: none; filter: drop-shadow(0 0 15px rgba(0,0,0,0.5));
        }
        @keyframes rgb-glow {
            0% { color: #ff0000; text-shadow: 0 0 20px #ff0000; }
            33% { color: #00ff00; text-shadow: 0 0 20px #00ff00; }
            66% { color: #0000ff; text-shadow: 0 0 20px #0000ff; }
            100% { color: #ff0000; text-shadow: 0 0 20px #ff0000; }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Vazirmatn', sans-serif; background: var(--bg-dark); color: var(--text-white); height: 100vh; overflow: hidden; }

        /* Auth System */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center; z-index: 100000;
        }
        .auth-card {
            background: #121212; padding: 40px; border-radius: 25px;
            width: 90%; max-width: 420px; text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.7);
        }
        .auth-input {
            width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 12px;
            border: none; background: var(--card-bg); color: #fff; font-family: inherit;
        }
        .auth-btn {
            width: 100%; padding: 16px; border-radius: 50px; border: none;
            background: var(--primary); color: #fff; font-weight: 900; cursor: pointer;
            font-size: 18px; transition: 0.3s;
        }
        .auth-btn:hover { transform: scale(1.03); background: #1ed760; }

        /* Layout */
        .app-grid {
            display: grid; grid-template-areas: "sidebar main" "player player";
            grid-template-columns: var(--sidebar-width) 1fr; grid-template-rows: 1fr 100px;
            height: 100vh;
        }

        #sidebar { grid-area: sidebar; background: var(--sidebar-bg); padding: 30px; border-left: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 10px; }
        #main { grid-area: main; overflow-y: auto; background: linear-gradient(180deg, #122c1e 0%, #050505 45%); }

        .nav-item { 
            padding: 14px 20px; border-radius: 12px; cursor: pointer; color: var(--text-gray); 
            display: flex; align-items: center; gap: 18px; font-weight: 700; transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { background: var(--card-bg); color: #fff; }
        .nav-item.active { color: var(--primary); }

        /* Song List */
        .song-row {
            display: grid; grid-template-columns: 50px 1fr 200px 100px 50px;
            padding: 12px 30px; align-items: center; cursor: pointer; border-radius: 12px; margin: 0 20px;
        }
        .song-row:hover { background: var(--card-bg); }
        .song-row.playing { color: var(--primary); }
        .song-row img { width: 48px; height: 48px; border-radius: 8px; margin-left: 15px; }

        /* Player Bar */
        #player { 
            grid-area: player; background: rgba(10,10,10,0.98); backdrop-filter: blur(15px);
            display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center; padding: 0 35px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .progress-bar { flex: 1; height: 5px; background: #333; border-radius: 10px; cursor: pointer; position: relative; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; border-radius: 10px; box-shadow: 0 0 10px var(--primary); }

        /* Mobile Responsiveness */
        @media (max-width: 850px) {
            .app-grid { grid-template-areas: "main" "player" "sidebar"; grid-template-columns: 1fr; grid-template-rows: 1fr 95px 75px; }
            #sidebar { flex-direction: row; padding: 10px; border-left: none; border-top: 1px solid rgba(255,255,255,0.1); justify-content: space-around; }
            .nav-item { flex-direction: column; font-size: 11px; gap: 5px; padding: 10px; }
            .song-row { grid-template-columns: 40px 1fr 70px 40px; }
            .col-album, .player-right { display: none; }
            .header-info h1 { font-size: 36px !important; }
            .msto-watermark { font-size: 35px; top: 15px; left: 15px; }
        }

        .view { display: none; }
        .view.active { display: block; }
    </style>
</head>
<body>

<div class="msto-watermark">مستۆ</div>

<div id="auth-overlay">
    <div class="auth-card" id="auth-box">
        <h2 id="auth-title" style="margin-bottom: 25px; font-size: 28px;">چوونەژوورەوە</h2>
        <input type="text" class="auth-input" id="user-input" placeholder="ناوی بەکارهێنەر یان ئیمەیڵ">
        <input type="password" class="auth-input" placeholder="وشەی نهێنی">
        <button class="auth-btn" onclick="enterApp()">چوونەژوورەوە</button>
        <p style="margin-top:25px; font-size:13px; color:var(--text-gray); cursor:pointer;" onclick="toggleAuth()">هەژمارت نییە؟ <span style="color:var(--primary)">دروستی بکە</span></p>
    </div>
</div>

<div class="app-grid">
    <aside id="sidebar">
        <div style="color:var(--primary); font-weight:900; font-size:24px; margin-bottom:30px; padding:0 20px;">M-CHAVOSHI</div>
        
        <div class="user-info" style="display:flex; align-items:center; gap:12px; padding:15px; background:var(--card-bg); border-radius:15px; margin-bottom:20px;">
            <div id="user-initial" style="width:35px; height:35px; background:var(--primary); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">M</div>
            <div id="display-name" style="font-weight:bold; font-size:14px;">بەکارهێنەر</div>
        </div>

        <div class="nav-item active" id="btn-home" onclick="showView('home')">🏠 سەرەکی</div>
        <div class="nav-item" id="btn-search" onclick="showView('search')">🔍 گەڕان</div>
        <div class="nav-item" id="btn-favs" onclick="showView('favorites')">❤️ دڵخوازم</div>
        
        <div class="nav-item" onclick="logout()" style="margin-top:auto; color:#ff4d4d;">🚪 دەرچوون</div>
    </aside>

    <main id="main">
        <div id="view-home" class="view active">
            <div class="header-info" style="padding: 70px 40px 40px; display: flex; align-items: flex-end; gap: 35px;">
                <img src="music/cover1.jpg" id="hero-img" style="width: 230px; height: 230px; border-radius: 18px; box-shadow: 0 20px 60px rgba(0,0,0,0.6);">
                <div>
                    <p style="text-transform: uppercase; font-size: 13px; font-weight: 900; color: var(--primary);">Featured Artist</p>
                    <h1 style="font-size: 70px; font-weight: 900; margin-bottom: 10px;">موحسین چاڤۆشی</h1>
                    <p id="song-stats" style="color: var(--text-gray);">١٦ گۆرانی • چەندین ئەلبوم</p>
                </div>
            </div>
            <div id="song-list-container"></div>
        </div>

        <div id="view-search" class="view" style="padding: 60px 40px;">
            <h1 style="font-size: 40px; margin-bottom: 30px;">چی دەبیستیت؟</h1>
            <input type="text" placeholder="ناوی گۆرانی یان ئەلبوم..." style="width:100%; max-width:600px; padding:18px 25px; border-radius:50px; border:none; background:var(--card-bg); color:#fff; font-size: 18px;" oninput="searchSongs(this.value)">
            <div id="search-results" style="margin-top:40px;"></div>
        </div>

        <div id="view-favorites" class="view" style="padding: 60px 40px;">
            <h1 style="font-size: 40px; margin-bottom: 30px;">❤️ دڵخوازەکانم</h1>
            <div id="fav-list-container"></div>
        </div>
    </main>

    <footer id="player">
        <div style="display:flex; align-items:center; gap:18px;">
            <img src="music/cover1.jpg" id="p-thumb" style="width:64px; height:64px; border-radius:8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
            <div>
                <div id="p-title" style="font-weight:900; font-size:16px;">گۆرانیەک هەڵبژێرە</div>
                <div style="font-size:13px; color:var(--text-gray);">موحسین چاڤۆشی</div>
            </div>
        </div>

        <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
            <div style="display:flex; align-items:center; gap:25px;">
                <button style="background:none; border:none; color:#fff; font-size:24px; cursor:pointer;" onclick="prevSong()">⏮</button>
                <button id="p-play-btn" onclick="togglePlay()" style="width:48px; height:48px; border-radius:50%; border:none; font-size:22px; cursor:pointer; background:#fff; color:#000; transition:0.2s;">▶</button>
                <button style="background:none; border:none; color:#fff; font-size:24px; cursor:pointer;" onclick="nextSong()">⏭</button>
            </div>
            <div style="width:100%; display:flex; align-items:center; gap:15px;">
                <span id="cur-time" style="font-size:11px; color:var(--text-gray); min-width:35px;">٠:٠٠</span>
                <div class="progress-bar" onclick="seek(event)"><div class="progress-fill" id="p-fill"></div></div>
                <span id="dur-time" style="font-size:11px; color:var(--text-gray); min-width:35px;">٠:٠٠</span>
            </div>
        </div>

        <div class="player-right" style="display:flex; justify-content:flex-end; align-items:center; gap:15px;">
            <span style="font-size:18px; opacity:0.6;">🔊</span>
            <div style="width:100px; height:5px; background:#333; border-radius:10px; overflow:hidden;"><div style="width:80%; height:100%; background:#fff;"></div></div>
        </div>
    </footer>
</div>

<audio id="audio-engine"></audio>

<script>
const songs = [
    { title: "کجایی", album: "Kojaei", cover: "music/cover1.jpg", src: "music/1.mp3", time: "٣:٥٠" },
    { title: "نفس", album: "Nafas", cover: "music/cover2.jpg", src: "music/2.mp3", time: "٤:٥٣" },
    { title: "هم خواب", album: "Hamkhab", cover: "music/cover3.jpg", src: "music/3.mp3", time: "٢:٥٧" },
    { title: "من بیاد میرافتم", album: "Miraftam", cover: "music/cover4.jpg", src: "music/4.mp3", time: "٣:٤٣" },
    { title: "ملکا", album: "Maleka", cover: "music/cover5.jpg", src: "music/5.mp3", time: "٤:٢٦" },
    { title: "زنگ زبور", album: "Tanhaye", cover: "music/cover6.jpg", src: "music/6.mp3", time: "٣:١٧" },
    { title: "فاصلە", album: "Faseleh", cover: "music/cover7.jpg", src: "music/7.mp3", time: "٥:١٤" },
    { title: "برای گریەهایت", album: "Khodkoshi", cover: "music/cover8.jpg", src: "music/8.mp3", time: "٥:٣٤" },
    { title: "ساعت دیواری", album: "Saat Divari", cover: "music/cover9.jpg", src: "music/9.mp3", time: "٣:٣٤" },
    { title: "قاتل حرفه ای", album: "Mohsen & Hamed", cover: "music/cover10.jpg", src: "music/10.mp3", time: "٤:٢٠" },
    { title: "سر این سفرە", album: "Goldoon", cover: "music/cover11.jpg", src: "music/11.mp3", time: "٥:٠٥" },
    { title: "ماه خورشید منی", album: "Gandom", cover: "music/cover12.jpg", src: "music/12.mp3", time: "٤:١٢" },
    { title: "زندانبان", album: "Zendanban", cover: "music/cover13.jpg", src: "music/13.mp3", time: "٣:٥٧" },
    { title: "پناه", album: "Panah", cover: "music/cover14.jpg", src: "music/14.mp3", time: "٤:٢٣" },
    { title: "باب دلمی", album: "Babe Delami", cover: "music/cover15.jpg", src: "music/15.mp3", time: "٣:١٦" },
    { title: "به رسمی", album: "Yadegar", cover: "music/cover16.jpg", src: "music/16.mp3", time: "٥:٣١" }
];

let curIdx = -1;
let favs = JSON.parse(localStorage.getItem('m_chavoshi_favs')) || [];
const audio = document.getElementById('audio-engine');

function render(list, id) {
    const el = document.getElementById(id);
    if(!el) return; el.innerHTML = '';
    list.forEach((s, i) => {
        const globalIdx = songs.indexOf(s);
        const row = document.createElement('div');
        row.className = `song-row ${globalIdx === curIdx ? 'playing' : ''}`;
        row.innerHTML = `
            <div style="font-weight:bold; opacity:0.5;">${i+1}</div>
            <div style="display:flex; align-items:center;" onclick="playSong(${globalIdx})">
                <img src="${s.cover}"> <span>${s.title}</span>
            </div>
            <span class="col-album" style="color:var(--text-gray)">${s.album}</span>
            <span style="color:var(--text-gray)">${s.time}</span>
            <span onclick="toggleFav(event, ${globalIdx})">${favs.includes(globalIdx) ? '❤️' : '🤍'}</span>
        `;
        el.appendChild(row);
    });
}

function playSong(i) {
    curIdx = i; audio.src = songs[i].src; audio.play();
    document.getElementById('p-play-btn').innerText = '⏸';
    document.getElementById('p-title').innerText = songs[i].title;
    document.getElementById('p-thumb').src = songs[i].cover;
    document.getElementById('hero-img').src = songs[i].cover;
    updateAll();
}

function togglePlay() {
    if(curIdx === -1) return playSong(0);
    if(audio.paused) { audio.play(); document.getElementById('p-play-btn').innerText = '⏸'; }
    else { audio.pause(); document.getElementById('p-play-btn').innerText = '▶'; }
}

function showView(v) {
    document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
    document.getElementById('view-'+v).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
    document.getElementById('btn-'+(v==='home'?'home':v==='search'?'search':'favs')).classList.add('active');
    if(v === 'favorites') render(songs.filter((_,i)=>favs.includes(i)), 'fav-list-container');
}

function toggleFav(e, i) {
    e.stopPropagation();
    if(favs.includes(i)) favs = favs.filter(x => x !== i); else favs.push(i);
    localStorage.setItem('m_chavoshi_favs', JSON.stringify(favs));
    updateAll();
}

function searchSongs(q) { render(songs.filter(s => s.title.includes(q)), 'search-results'); }
function nextSong() { playSong((curIdx + 1) % songs.length); }
function prevSong() { playSong((curIdx - 1 + songs.length) % songs.length); }

audio.ontimeupdate = () => {
    document.getElementById('p-fill').style.width = (audio.currentTime / audio.duration) * 100 + '%';
    const m = Math.floor(audio.currentTime / 60); const s = Math.floor(audio.currentTime % 60);
    document.getElementById('cur-time').innerText = `${m}:${s < 10 ? '0'+s : s}`;
};

function seek(e) {
    const r = e.currentTarget.getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
}

function enterApp() {
    const name = document.getElementById('user-input').value || "بەکارهێنەر";
    document.getElementById('display-name').innerText = name;
    document.getElementById('user-initial').innerText = name[0].toUpperCase();
    document.getElementById('auth-overlay').style.display = 'none';
}

function logout() { document.getElementById('auth-overlay').style.display = 'flex'; }
function toggleAuth() { 
    const t = document.getElementById('auth-title');
    t.innerText = t.innerText === 'چوونەژوورەوە' ? 'دروستکردنی هەژمار' : 'چوونەژوورەوە';
}

function updateAll() {
    render(songs, 'song-list-container');
    if(document.getElementById('view-favorites').classList.contains('active')) render(songs.filter((_,i)=>favs.includes(i)), 'fav-list-container');
}

updateAll();
</script>
</body>
</html>
